required_values:
  baselines/REQ-BASELINE-001.yaml:
    object_type: requirement_baseline
    baseline_state: approved
    approval_status: approved
    approval_route: policy_certified
  baselines/REQ-BASELINE-DRAFT-001.yaml:
    object_type: requirement_baseline
    baseline_state: draft
    approval_status: pending
  context/CTX-001.yaml:
    object_type: context_snapshot
    snapshot_state: approved
    approval_status: approved
    approval_route: policy_certified
  context/CTX-DRAFT-001.yaml:
    object_type: context_snapshot
    snapshot_state: captured
    approval_status: pending
required_sections:
  README.md: [复制后的目录, 权威边界, 使用顺序, 声明边界]
  项目地图.md: [当前目标, 当前阶段, 核心链路, 能力与功能, 批准需求, 重大决策, 风险与 Unknown, 下一步]
  capabilities/CAP-001_能力卡.md:
    - 能力目标
    - 业务来源
    - 父级与子级能力
    - 包含的功能
    - 主要输入输出
    - 不包含什么
    - 跨能力接缝
    - 适用范围
    - AI 拆分自检
  functions/FUNC-001_功能需求卡.md:
    - 一句话结论
    - 为什么需要
    - 使用者与触发条件
    - 正常流程
    - 异常、拒绝和恢复
    - 输入
    - 输出
    - 输出格式示例
    - 状态矩阵
    - 典型示例
    - 业务规则
    - 非目标与边界
    - 数据、权限与风险
    - 验收方向
    - 已批准实现约束
    - 候选实现要点
    - 方案选择入口
    - 已有资产
    - 未知与待确认
    - 决策门与批准路由
    - 上下游影响
    - AI 生成自检
    - Spec 映射
  generated/README.md: [可生成视图, 声明边界]
authority_boundary:
  capability_authority: capabilities/*.md
  functional_requirement_authority: functions/*.md
  project_map_role: reference_only
  generated_role: derived_non_authoritative
  spec_may_consume_only: approved_baseline_members
  candidate_solution_must_enter: research_or_ADR
state_invariants:
  - copied_project_uses_draft_baseline_and_captured_context
  - approved_examples_are_reference_fixtures_not_copy_targets
  - approved_object_requires_exactly_one_valid_decision_route
  - approved_baseline_requires_valid_decision_gate_and_non_empty_member_hashes
  - approved_snapshot_requires_valid_decision_gate_and_verified_source_hashes
  - policy_certified_requires_current_scope_matched_certification_verdict
  - policy_certified_rejects_scope_threshold_rule_permission_or_responsibility_expansion
  - human_signoff_requires_verified_human_principal
  - unresolved_unknown_blocks_approved_state
  - AI_cannot_self_certify_or_promote_without_a_valid_decision_gate
failure_semantics:
  mode: fail_closed
  missing_required_file: invalid_package
  missing_required_field: invalid_package
  missing_required_frontmatter_field: invalid_package
  invalid_yaml_or_frontmatter: invalid_package
  orphan_function: blocked
  capability_cycle: blocked
  unapproved_spec_ref: blocked
  intent_mismatch: blocked
  invalid_approval_route: blocked
  missing_or_stale_certification: blocked
  decision_route_mismatch: blocked
  unresolved_unknown: blocked
  mutable_approved_baseline: invalid_package
  prompt_or_chat_as_authority: blocked
compatibility:
  minimum_project_os_schema_version: 3
  template_contract_version: 2
  breaking_change_requires_major_version: true
