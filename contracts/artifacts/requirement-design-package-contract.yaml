# 人机需求设计包的机器结构契约；业务内容与批准决定留在 L2。
schema_version: 1
contract_id: requirement-design-package-contract
version: 1
template_root: templates/standard-project/requirements
required_files:
  - README.md
  - 项目地图.md
  - functions/FUNC-001_功能需求卡.md
  - baselines/REQ-BASELINE-001.yaml
  - context/CTX-001.yaml
  - generated/README.md
required_frontmatter_fields:
  functions/FUNC-001_功能需求卡.md:
    - stable_id
    - object_type
    - requirement_kind
    - function_id
    - canonical_path
    - version
    - governance_scope
    - lifecycle_stage
    - priority
    - work_status
    - approval_status
    - implementation_status
    - owner
    - executor
    - approver
    - verifier
    - capability_refs
    - business_requirement_refs
    - business_chain_refs
    - scenario_refs
    - intent.original_intent
    - intent.interpreted_intent
    - intent.approved_intent
    - intent.implementation_intent
    - context_snapshot_ref
    - baseline_ref
    - content_hash
    - supersedes
    - candidate_solution_status
    - spec_refs
    - stale_status
required_frontmatter_values:
  functions/FUNC-001_功能需求卡.md:
    object_type: requirement
    requirement_kind: functional
    candidate_solution_status: candidate
required_fields:
  baselines/REQ-BASELINE-001.yaml:
    - schema_version
    - stable_id
    - object_type
    - version
    - baseline_state
    - canonical_path
    - requirement_refs
    - scope_hash
    - approved_by
    - approved_at
    - content_hash
    - supersedes
  context/CTX-001.yaml:
    - schema_version
    - stable_id
    - object_type
    - version
    - snapshot_state
    - canonical_path
    - included_files
    - excluded_files
    - exclusion_reasons
    - source_hashes
    - generated_by
    - approved_by
    - created_at
    - content_hash
required_values:
  baselines/REQ-BASELINE-001.yaml:
    object_type: requirement_baseline
    baseline_state: approved
  context/CTX-001.yaml:
    object_type: context_snapshot
    snapshot_state: approved
required_sections:
  README.md: [复制后的目录, 权威边界, 使用顺序, 声明边界]
  项目地图.md: [当前目标, 当前阶段, 核心链路, 能力与功能, 批准需求, 重大决策, 风险与 Unknown, 下一步]
  functions/FUNC-001_功能需求卡.md:
    - 一句话结论
    - 为什么需要
    - 使用者与触发条件
    - 正常流程
    - 异常、拒绝和恢复
    - 输入
    - 输出
    - 业务规则
    - 非目标与边界
    - 数据、权限与风险
    - 验收方向
    - 已批准实现约束
    - 候选实现要点
    - 已有资产
    - 未知与待确认
    - 上下游影响
    - AI 生成自检
    - Spec 映射
  generated/README.md: [可生成视图, 声明边界]
authority_boundary:
  functional_requirement_authority: functions/*.md
  project_map_role: reference_only
  generated_role: derived_non_authoritative
  spec_may_consume_only: approved_baseline_members
failure_semantics:
  mode: fail_closed
  missing_required_file: invalid_package
  missing_required_field: invalid_package
  missing_required_frontmatter_field: invalid_package
  invalid_yaml_or_frontmatter: invalid_package
  unapproved_spec_ref: blocked
  intent_mismatch: blocked
  mutable_approved_baseline: invalid_package
  prompt_or_chat_as_authority: blocked
compatibility:
  minimum_project_os_schema_version: 3
  template_contract_version: 1
  breaking_change_requires_major_version: true
