    - "sha256:S4-evidence-1-example"

negative_examples:
  missing_axis:
    description: approval_status_is_absent
    invalid_record:
      stage: S4
      scope: engineering-design/checkout-boundary/v1
      work_status: complete
      implementation_status: implemented
      proof_level: contract_tests_ready
      framework_edition: standard
      governance_profile: standard
    missing_fields: [approval_status]
    result: blocked
    handling: fail_closed
  mixed_axis:
    description: independent_axes_are_collapsed_into_ambiguous_fields
    invalid_fields:
      status: work_complete_approval_approved_implementation_implemented
      profile: standard_framework_and_standard_governance
    collapsed_axes:
      - work_status
      - approval_status
      - implementation_status
      - framework_edition
      - governance_profile
    result: blocked
    handling: fail_closed
  unknown_axis:
    description: unknown_axis_value_cannot_be_inferred_from_other_coordinates
    axis: proof_level
    invalid_value: unknown
    result: blocked
    handling: fail_closed
  missing_criterion:
    description: one_stage_exit_criterion_has_no_result_item
    stage_definition_ref: stage-exit-gates-contract@2#stages.S4
    omitted_criterion_ref: stage-exit-gates-contract@2#stages.S4.exit_criteria[1]
    result: blocked
    handling: fail_closed
  failed_criterion:
    description: failed_exit_criterion_blocks_stage_exit
    criterion_ref: stage-exit-gates-contract@2#stages.S4.exit_criteria[0]
    criterion_status: failed
    result: blocked
    handling: fail_closed
  missing_evidence:
    description: passed_exit_criterion_has_no_evidence
    criterion_ref: stage-exit-gates-contract@2#stages.S4.exit_criteria[0]
    criterion_status: passed
    evidence_refs: []
    result: blocked
    handling: fail_closed
  stale_waiver:
    description: waived_exit_criterion_references_expired_or_scope_mismatched_waiver
    criterion_ref: stage-exit-gates-contract@2#stages.S4.exit_criteria[1]
    criterion_status: waived
    waiver_ref: waiver/S4-criterion-1/expired
    waiver_valid_until: "2026-07-10T00:00:00Z"
    waiver_scope: engineering-design/different-scope/v1
    result: blocked
    handling: fail_closed
  intent_drift:
    description: implementation_intent_is_not_bound_to_decision_gate_approved_intent
    criterion_ref: stage-exit-gates-contract@1#stages.S0.exit_criteria[0]
    result: blocked
    handling: fail_closed
  AI_self_certification:
    description: requirement_generator_attempts_to_self_certify_or_bypass_activation_policy
    criterion_ref: stage-exit-gates-contract@1#stages.S2.exit_criteria[1]
    result: blocked
    handling: fail_closed
  unapproved_functional_requirement:
    description: spec_references_unapproved_or_stale_functional_requirement
    criterion_ref: stage-exit-gates-contract@1#stages.S5.exit_criteria[0]
    result: blocked
    handling: fail_closed
  baseline_member_hash_mismatch:
    description: spec_or_baseline_member_does_not_match_exact_requirement_version_and_hash
    criterion_ref: stage-exit-gates-contract@1#stages.S5.exit_criteria[0]
    result: blocked
    handling: fail_closed
  prompt_context_authority_bypass:
    description: prompt_chat_or_temporary_note_is_included_as_approved_authority
    criterion_ref: stage-exit-gates-contract@1#stages.S2.exit_criteria[1]
    result: blocked
    handling: fail_closed

stages:
