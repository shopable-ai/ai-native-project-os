# R0 与 S0—S7 阶段退出门禁机器契约
# 本契约固定可校验的阶段输入、产物、退出、证据、失效和重开记录；人类操作语义见 docs/workflows/STAGE_EXIT_GATES.md。

schema_version: 1
contract_id: stage-exit-gates-contract
version: 1

# 这些坐标独立记录；任何一个坐标都不能被另一个坐标的值推导或替代。
independent_axes:
  - stage
  - work_status
  - approval_status
  - implementation_status
  - proof_level
  - framework_edition
  - governance_profile

invariants:
  - independent_axes_must_not_be_collapsed_or_inferred_from_each_other
  - stage_exit_requires_a_fresh_stage_gate_record_for_the_exact_scope
  - later_stage_evidence_cannot_retroactively_satisfy_an_invalid_earlier_gate
  - maturity_or_implementation_status_cannot_substitute_for_required_proof

stage_gate_record:
  required_fields:
    - stage
    - scope
    - work_status
    - approval_status
    - implementation_status
    - proof_level
    - framework_edition
    - governance_profile
    - stage_definition_ref
    - stage_definition_hash
    - exit_criterion_results
    - required_object_refs
    - required_proof_level
    - verification_commands
    - result
    - uncovered_items
    - waivers
    - approved_by
    - verified_by
    - checked_at
    - valid_until
    - invalidation_conditions
    - reopen_target
    - evidence_refs
    - evidence_hashes
  enums:
    result: [passed, failed, unknown]
  fail_closed_results: [failed, unknown]
  exit_criterion_result:
    required_fields:
      - criterion_ref
      - criterion_hash
      - status
      - evidence_refs
      - waiver_ref
    enums:
      status: [passed, waived, failed, unknown]
  invariants:
    - failed_or_unknown_result_blocks_stage_exit
    - required_proof_level_is_gate_target
    - proof_level_is_actual_evidence_coordinate
    - stage_definition_ref_and_hash_must_exactly_match_evaluated_stage_definition
    - exit_criterion_results_exactly_cover_stage_exit_criteria_once
    - criterion_ref_and_hash_must_exactly_match_stage_definition
    - passed_criterion_requires_non_empty_evidence_refs
    - waived_criterion_requires_valid_unexpired_scope_matched_waiver
    - failed_unknown_or_missing_criterion_blocks_stage_exit
    - passed_requires_non_empty_required_object_refs
    - passed_requires_non_empty_verification_commands
    - passed_requires_non_empty_evidence_refs_and_evidence_hashes
    - evidence_refs_and_hashes_must_have_same_cardinality
    - passed_requires_every_exit_criterion_satisfied_or_explicitly_waived
    - every_waiver_requires_scope_reason_approver_expiry_and_reopen_condition
    - missing_unverified_stale_or_scope_mismatched_evidence_yields_unknown
    - checked_at_must_precede_valid_until
    - invalidation_condition_match_invalidates_record_and_reopens_target
    - approval_and_verification_must_preserve_required_separation_of_duties

# required_proof_level 表示退出门禁要求达到的最低目标；proof_level 表示本记录中 Evidence 实际证明到的坐标。
field_semantics:
  required_proof_level: gate_target_minimum_proof_level
  proof_level: actual_verified_evidence_coordinate

manifest_example:
  stage: S4
  scope: engineering-design/checkout-boundary/v1
  work_status: complete
  approval_status: approved
  implementation_status: implemented
  proof_level: contract_tests_ready
  framework_edition: standard
  governance_profile: standard
  stage_definition_ref: stage-exit-gates-contract@1#stages.S4
  stage_definition_hash: "sha256:stage-S4-example"
  exit_criterion_results:
    - criterion_ref: stage-exit-gates-contract@1#stages.S4.exit_criteria[0]
      criterion_hash: "sha256:S4-exit-criterion-0-example"
      status: passed
      evidence_refs:
        - evidence/S4-seam-and-failure-owner-review/v1
      waiver_ref: null
    - criterion_ref: stage-exit-gates-contract@1#stages.S4.exit_criteria[1]
      criterion_hash: "sha256:S4-exit-criterion-1-example"
      status: passed
      evidence_refs:
        - evidence/S4-acceptance-exit-review/v1
      waiver_ref: null
  required_object_refs:
    - contract/checkout-boundary/v1
    - adr/checkout-boundary/v1
  required_proof_level: contract_tests_ready
  verification_commands:
    - python3 -m unittest tests.test_checkout_contract -v
  result: passed
  uncovered_items: []
  waivers: []
  approved_by: architecture-approver-id
  verified_by: independent-verifier-id
  checked_at: "2026-07-11T10:00:00Z"
  valid_until: "2026-07-18T10:00:00Z"
  invalidation_conditions:
    - contract_or_ADR_hash_changes
    - required_proof_level_changes
  reopen_target: S4
  evidence_refs:
    - evidence/S4-seam-and-failure-owner-review/v1
    - evidence/S4-acceptance-exit-review/v1
  evidence_hashes:
    - "sha256:S4-evidence-0-example"
    - "sha256:S4-evidence-1-example"

negative_examples:
  missing_axis:
    description: approval_status_is_absent
    invalid_record:
      stage: S4
      scope: engineering-design/checkout-boundary/v1
      work_status: complete
      implementation_status: implemented
      proof_level: contract_tests_ready
      framework_edition: standard
      governance_profile: standard
    missing_fields: [approval_status]
    result: blocked
    handling: fail_closed
  mixed_axis:
    description: independent_axes_are_collapsed_into_ambiguous_fields
    invalid_fields:
      status: work_complete_approval_approved_implementation_implemented
      profile: standard_framework_and_standard_governance
    collapsed_axes:
      - work_status
      - approval_status
      - implementation_status
      - framework_edition
      - governance_profile
    result: blocked
    handling: fail_closed
  unknown_axis:
    description: unknown_axis_value_cannot_be_inferred_from_other_coordinates
    axis: proof_level
    invalid_value: unknown
    result: blocked
    handling: fail_closed
  missing_criterion:
    description: one_stage_exit_criterion_has_no_result_item
    stage_definition_ref: stage-exit-gates-contract@1#stages.S4
    omitted_criterion_ref: stage-exit-gates-contract@1#stages.S4.exit_criteria[1]
    result: blocked
    handling: fail_closed
  failed_criterion:
    description: failed_exit_criterion_blocks_stage_exit
    criterion_ref: stage-exit-gates-contract@1#stages.S4.exit_criteria[0]
    criterion_status: failed
    result: blocked
    handling: fail_closed
  missing_evidence:
    description: passed_exit_criterion_has_no_evidence
    criterion_ref: stage-exit-gates-contract@1#stages.S4.exit_criteria[0]
    criterion_status: passed
    evidence_refs: []
    result: blocked
    handling: fail_closed
  stale_waiver:
    description: waived_exit_criterion_references_expired_or_scope_mismatched_waiver
    criterion_ref: stage-exit-gates-contract@1#stages.S4.exit_criteria[1]
    criterion_status: waived
    waiver_ref: waiver/S4-criterion-1/expired
    waiver_valid_until: "2026-07-10T00:00:00Z"
    waiver_scope: engineering-design/different-scope/v1
    result: blocked
    handling: fail_closed

