      - approved_requirement_reverse_map_or_orphan_disposition
    exit_criteria:
      - every_critical_active_implementation_has_auditable_provenance_or_orphan_status
      - runtime_entrypoints_and_unknowns_have_owners
    evidence_requirements:
      - repository_build_and_readonly_runtime_inventory_with_hashes_and_commands
      - source_references_and_explicit_proof_boundaries
    invalidation_triggers:
      - new_entrypoint_source_dependency_or_scan_scope_discovered
