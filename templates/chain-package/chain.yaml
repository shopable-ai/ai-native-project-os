schema_version: 1
contract_ref: chain-package-contract@2
chain_id: "{{chain_id}}"
display_name: "{{chain_name}}"
priority: "{{priority}}"
requirement_refs:
  - "{{requirement_ref}}"
owners:
  business: "{{business_owner}}"
  execution: "{{execution_owner}}"
path_types: [normal, exception, recovery]
scenario_refs:
  - "{{scenario_ref}}"
behavior_specification_ref: "scenarios.md#behavior-specification:{{behavior_spec_id}}"
behavior_case_registry_ref: "scenarios.md#behavior-case-registry:*"
test_space_model_ref: "acceptance.md#test-space-model:{{test_space_id}}"
acceptance_coverage_ref: "acceptance.md#acceptance-coverage-matrix:*"
trigger_refs:
  - "{{trigger_ref}}"
diagram_policy:
  required_priorities: [p0, p1]
  requirement: required
  source_ref: diagrams/README.md
acceptance_ref: acceptance.md
traceability_ref: traceability.md
