# 项目治理机器路由策略
# 语义说明见 docs/workflows/PROJECT_TYPE_AND_GOVERNANCE_ROUTING.md。

schema_version: 1
policy_id: project-governance-routing
policy_version: 1

enums:
  risk: [low, medium, high, critical]
  external_side_effect: [none, read_external, write_reversible, write_irreversible]
  reversibility: [full, partial, none]
  execution_topology: [single_agent, multi_agent]
  production_tier: [development, test, staging, production]
  unknown_value: unknown

route_input_required_fields:
  - complexity
  - uncertainty
  - data_sensitivity
  - external_side_effect
  - reversibility
  - regulatory_impact
  - availability_requirement
  - agent_collaboration_complexity
  - execution_topology
  - production_tier

route_input_schema:
  complexity: risk
  uncertainty: risk
  data_sensitivity: risk
  external_side_effect: external_side_effect
  reversibility: reversibility
  regulatory_impact: risk
  availability_requirement: risk
  agent_collaboration_complexity: risk
  execution_topology: execution_topology
  production_tier: production_tier
  every_field_may_explicitly_use: unknown

base_profile:
  default: standard
  lite:
    requires_human_rule_approval: true
    requires_all:
      complexity: [low]
      uncertainty: [low]
      data_sensitivity: [low]
      external_side_effect: [none, read_external]
      reversibility: [full]
      regulatory_impact: [low]
      availability_requirement: [low]
      agent_collaboration_complexity: [low]
      production_tier: [development, test]
  standard:
    applies_when_lite_is_not_fully_satisfied: true
    applies_when_any_routing_input_is_unknown: true

required_overlays:
  multi_agent:
    when_any:
      execution_topology: [multi_agent]
      agent_collaboration_complexity: [high, critical]
    unknown_when_any:
      execution_topology: [unknown]
      agent_collaboration_complexity: [unknown]
  production:
    when_any:
      production_tier: [production]
    unknown_when_any:
      production_tier: [unknown]

review_governance:
  rule_authority: human_approved_versioned_markdown
  routine_content_review: ai_automated
  routine_review_human_wait: forbidden
  failure_routes: [rewrite_required, blocked, rule_gap]
  irreversible_action_authorization: human_approval_ticket
  missing_or_stale_rule_set: fail_closed

activation_gate:
  evaluation_subject: route_decision.overlays.{overlay_id}
  source_contracts:
    route_decision: route-decision-contract@1
    control_set: control-set-contract@1
    authorization_snapshot: authorization-snapshot-contract@1
    activation_verdict: overlay-activation-verdict-contract@1
  route_fields:
    - route_decision_id
    - control_set_ref
    - control_set_version
    - control_set_hash
    - overlays.{overlay_id}.required
    - overlays.{overlay_id}.selected
    - overlays.{overlay_id}.enabled
    - overlays.{overlay_id}.implementation_status
    - overlays.{overlay_id}.verification_status
    - overlays.{overlay_id}.authorization_snapshot_ref
    - overlays.{overlay_id}.overlay_activation_verdict_ref
  control_set_fields:
    - overlay_modules.{overlay_id}.included
    - overlay_modules.{overlay_id}.implementation_status
    - overlay_modules.{overlay_id}.control_refs_by_category
    - overlay_modules.{overlay_id}.implementation_evidence_refs
  verdict_fields:
    - overlay_id
    - route_v1_ref
    - control_set_ref
    - control_set_hash
    - authorization_snapshot_ref
    - decision
  authorization_snapshot_fields:
    - authorization_snapshot_id
    - route_decision_ref
    - control_set_ref
    - control_set_hash
    - separation_of_duties_result
    - verification_status
    - expires_at
    - revocation_status
    - signature_ref
  missing_or_unknown: fail_closed
  required_unknown: block_activation_and_claim

orthogonal_controls:
  external_side_effect: authorization_side_effects_and_isolation
  data_sensitivity: authorization_side_effects_and_isolation
  regulatory_impact: project_specific_compliance_policy
  note: 这些风险控制在任何环境都适用，不依赖 production 叠加能力。
