# AI 自动审核裁决机器契约
# 普通业务内容由独立 AI 依据 active 规则集审核；人工授权不能覆盖 blocked 结论。

schema_version: 1
contract_id: ai-review-verdict-contract
contract_version: 1
object_type: ai_review_verdict

required_fields:
  - extends
  - review_verdict_id
  - project_id
  - subject_ref
  - subject_hash
  - generator_run_ref
  - generator_execution_node_ref
  - review_run_ref
  - reviewer_actor_id
  - reviewer_execution_node_ref
  - rule_set_ref
  - rule_set_hash
  - rule_coverage_refs
  - finding_refs
  - evidence_refs
  - evidence_hashes
  - decision
  - rewrite_attempt
  - max_rewrite_attempts
  - rule_gap_case_ref
  - claim_ceiling
  - decided_at

finding_required_fields:
  - finding_id
  - rule_ref
  - severity
  - subject_location
  - evidence_refs
  - explanation
  - recommended_action

enums:
  decision: [pending, allow, rewrite_required, blocked, rule_gap]
  severity: [info, low, medium, high, critical]

manifest_example:
  extends: controlled_object_base/v1
  review_verdict_id: ai-review-verdict-id
  project_id: project-id
  subject_ref: stable-id/1/sha256
  subject_hash: sha256
  generator_run_ref: generator-run-id
  generator_execution_node_ref: generator-node/1
  review_run_ref: review-run-id
  reviewer_actor_id: reviewer-actor-id
  reviewer_execution_node_ref: reviewer-node/1
  rule_set_ref: rule-set-id/1
  rule_set_hash: sha256
  rule_coverage_refs: []
  finding_refs: []
  evidence_refs: []
  evidence_hashes: []
  decision: pending
  rewrite_attempt: 0
  max_rewrite_attempts: 2
  rule_gap_case_ref: null
  claim_ceiling: control_package
  decided_at: timestamp

invariants:
  - reviewer_run_and_execution_node_must_be_independent_from_generator
  - reviewer_actor_identity_and_role_binding_must_be_auditable
  - rule_set_must_be_active_fresh_scope_matched_and_hash_matched
  - subject_ref_and_hash_must_match_reviewed_content
  - every_finding_requires_resolvable_rule_ref
  - every_finding_requires_evidence_and_subject_location
  - allow_requires_non_empty_rule_coverage_and_verified_fresh_evidence
  - allow_requires_all_mandatory_rules_evaluated
  - evidence_refs_and_hashes_have_same_cardinality
  - rewrite_required_requires_positive_max_rewrite_attempts
  - every_rewrite_creates_new_attempt_or_run_and_preserves_prior_output
  - rewrite_limit_exhaustion_requires_blocked
  - blocked_cannot_continue_to_release_or_side_effect
  - rule_gap_requires_rule_gap_case_ref_and_blocks_current_subject
  - routine_review_must_not_fallback_to_waiting_approval
  - human_authorization_cannot_override_blocked_review
  - natural_language_keyword_routing_is_forbidden_in_l1_kernel
  - unknown_or_missing_field_fails_closed
