    proposed_change: 每个非纯人工节点必须声明成本、令牌、延迟和尝试预算；重试仅允许针对显式 retryable 错误并记录累计消耗，预算耗尽返回结构化失败；外部副作用重试还必须受幂等键和回执约束。
    accepted_or_rejected: accepted
    rejection_reason: null
    score_delta: not_evaluated
    remaining_risk: 多节点共享预算和并发争用仍需最小运行器实现后验证。

