  - review_id: AIEX-010
    reviewer_role: AI 原生执行架构专家
    attacked_assumption: agent_action、human_decision 和 external_system 可以共用一个“执行成功”状态，候选框架也可顺便承担这些语义。
    affected_artifact: docs/architecture/AI_NATIVE_EXECUTION_MODEL.md
    severity: P0
    evidence: 当前已要求智能体、工作流、技能和工具分开建模，并声明候选框架只能经研究和适配器接入；但尚未定义 agent_action 的授权票据、human_decision 的不可代理裁决记录，以及 external_system 的请求、幂等、回执和撤销语义。
    proposed_change: 分别定义三类节点契约：agent_action 记录 capability_grant 和实际 tool_calls；human_decision 记录 human_actor、decision_scope、verdict、时间和签名引用且禁止 AI 代签；external_system 记录 adapter_id、request_fingerprint、idempotency_key、timeout、receipt、reconciliation 和 rollback_or_compensation。LangGraph、Temporal、OPA 等仅可作为实现适配器候选，不得进入内核枚举或默认依赖。
    accepted_or_rejected: accepted
    rejection_reason: null
    score_delta: not_evaluated
    remaining_risk: 高风险操作的身份真实性、撤销可行性和崩溃恢复必须通过运行实验，设计文本不能提供证明。

