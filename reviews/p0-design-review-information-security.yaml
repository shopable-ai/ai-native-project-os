    remaining_risk: "第三方接口可能违反其无副作用契约，仍需外部回执和真实状态审计。"

  - review_id: SECU-005
    reviewer_role: 安全、权限与可靠性专家
    attacked_assumption: "秘密采用 secret_refs 且禁止写入 prompt、日志、Evidence 或缓存，就足以防止泄漏。"
    affected_artifact:
      - docs/governance/AUTHORIZATION_SIDE_EFFECTS_AND_ISOLATION.md
      - docs/governance/RUN_EVIDENCE_ACCEPTANCE.md
    severity: P0
    evidence:
      - "第 26、36、46 行规定引用和项目归属，但没有定义短时租约、轮换、撤销传播、使用次数或派生凭据。"
      - "Run 和 Evidence 会保存 Tool 输出、失败信息和原始观察，未要求保存前进行秘密检测与结构化脱敏。"
