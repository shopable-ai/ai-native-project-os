  - review_id: INFO-009
    reviewer_role: 信息架构与知识治理专家
    attacked_assumption: "研究登记项处于 planned 状态时仍可以拥有主观质量分，并可统一阻断标准版阶段。"
    affected_artifact:
      - research/registry.yaml
      - docs/research/RESEARCH_WORKFLOW.md
      - docs/governance/GATES_PROOF_SCORING.md
    severity: P0
