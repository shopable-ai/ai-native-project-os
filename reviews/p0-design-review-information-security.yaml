  - review_id: SECU-001
    reviewer_role: 安全、权限与可靠性专家
    attacked_assumption: "当前责任分离表已经足以阻止 Agent 自提、自批、自证。"
    affected_artifact:
      - docs/governance/AUTHORIZATION_SIDE_EFFECTS_AND_ISOLATION.md
      - docs/governance/CONTROLLED_OBJECT_MODEL.md
      - docs/governance/RUN_EVIDENCE_ACCEPTANCE.md
    severity: P0
    evidence:
      - "AUTHORIZATION_SIDE_EFFECTS_AND_ISOLATION.md 第 14 行只要求高风险时 executor 与 approver/verifier 分离，没有明确 approver 与 verifier 是否必须互相独立。"
      - "CONTROLLED_OBJECT_MODEL.md 第 43 行仅禁止同一 AI 同时承担四项责任，仍可能允许同一 AI 兼任其中三项。"
      - "Acceptance Verdict 的 decided_by 支持 independent-gate，但未要求记录其与 executor、approver 的身份冲突检查结果。"
    proposed_change: "建立逐对象、逐动作的责任分离矩阵。真实外部写、敏感数据、例外、生产声明和高风险 Verdict 必须满足 executor、approver、verifier 三方身份互斥；owner 必须是可追责人类。机器门禁必须校验 actor_id、human_identity 和 delegation_chain，冲突时 fail-closed。"
    accepted_or_rejected: accepted
    rejection_reason: null
    score_delta: not_evaluated
    remaining_risk: "设计无法证明多个账号背后不是同一主体；后续仍需身份提供方和审计运行证明。"

  - review_id: SECU-002
    reviewer_role: 安全、权限与可靠性专家
    attacked_assumption: "capability_id 加若干权限数组足以表达最小权限授权。"
    affected_artifact:
      - docs/governance/AUTHORIZATION_SIDE_EFFECTS_AND_ISOLATION.md
      - docs/architecture/AI_NATIVE_EXECUTION_MODEL.md
    severity: P0
    evidence:
      - "能力授权样例只有 file_roots、network_destinations、secret_refs、data_classes 和 external_actions，未区分具体操作、资源选择器、环境、次数和 deny 规则。"
      - "agent_action 虽要求能力白名单，但节点声明没有 capability_ref、授权作用域或授权版本。"
      - "授权缺少 issued_for_run、policy_version、namespace、max_uses、conditions 和 audit_ref，难以约束授权转用。"
    proposed_change: "把授权建模为版本化 capability grant：包含 project_id、namespace、environment、subject、resource_selector、allowed_operations、explicit_denies、purpose、issued_for_run、policy_version、max_uses、有效期、撤销状态和审计引用；默认拒绝且 deny 优先，未知字段或未知操作 fail-closed。"
    accepted_or_rejected: accepted
    rejection_reason: null
    score_delta: not_evaluated
    remaining_risk: "没有权限执行器和拒绝路径测试前，声明式 grant 仍不能证明实际 Tool 遵守授权。"

  - review_id: SECU-003
    reviewer_role: 安全、权限与可靠性专家
    attacked_assumption: "限制 file_roots 就能阻止跨项目文件访问。"
    affected_artifact:
      - docs/governance/AUTHORIZATION_SIDE_EFFECTS_AND_ISOLATION.md
    severity: P0
    evidence:
      - "第 24、36、42 行只规定允许根目录，未区分 read、create、modify、delete、execute。"
      - "没有规定路径规范化、realpath 校验、符号链接逃逸、硬链接、挂载点、相对路径和临时文件继承规则。"
      - "删除属于人工门禁动作，但文件权限模型没有把 delete 单独建模。"
    proposed_change: "文件授权必须绑定规范化绝对路径和操作集合，并在每次访问时做 realpath containment；拒绝符号链接、挂载或路径变化造成的根目录逃逸。read/write/create/delete/execute 分开授权，临时目录继承同一 namespace，删除和跨根移动单独审批。"
    accepted_or_rejected: accepted
    rejection_reason: null
    score_delta: not_evaluated
    remaining_risk: "不同平台的链接、ACL 和文件系统语义不同，仍需跨平台安全测试。"

