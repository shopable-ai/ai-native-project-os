  - review_id: INFO-001
    reviewer_role: 信息架构与知识治理专家
    attacked_assumption: "为单次设计审查提供的临时人工笔记应登记为 L1 框架来源资产。"
    affected_artifact:
      - project-os.yaml
      - docs/architecture/REPOSITORY_AND_LAYER_CONTRACT.md
    severity: P0
    evidence:
      - "L1 必须可以独立理解、验证和维护，不应依赖临时会话材料或其他项目的本机路径。"
      - "临时笔记只能用于发现候选问题；被接受的概念必须经独立架构判断后重新表述。"
    proposed_change: "禁止将临时人工笔记、聊天摘录、外部项目绝对路径或哈希登记为 L1 资产。仅将经独立验证后的通用结论写入其唯一权威文件，不保留临时材料的路径或措辞依赖。"
    accepted_or_rejected: accepted
    rejection_reason: null
    score_delta: not_evaluated
    remaining_risk: "实现阶段若不记录执行节点实际加载的上下文，临时材料仍可能绕过正式批准链。"

  - review_id: INFO-002
    reviewer_role: 信息架构与知识治理专家
    attacked_assumption: "来源、事实、需求、假设、未知和研究可以只靠文档语境区分。"
    affected_artifact:
      - docs/governance/ARTIFACTS_AND_TRACEABILITY.md
      - docs/research/RESEARCH_WORKFLOW.md
      - docs/workflows/PROJECT_LIFECYCLE.md
    severity: P0
    evidence:
      - "PROJECT_LIFECYCLE.md 的 S1 输出仅并列“事实/假设/未知”，未定义升格条件、批准状态和相互迁移。"
      - "RESEARCH_WORKFLOW.md 第 5 节写“确认的业务事实 → business/”，但未要求事实所有者批准，可能把研究结论直接升格为业务事实。"
      - "ARTIFACTS_AND_TRACEABILITY.md 仅笼统定义“业务事实和需求”，没有区分 source assertion、candidate fact、approved fact、assumption、unknown、research question 和 verdict。"
    proposed_change: "在受控对象权威中定义认知对象语义和合法迁移：原始陈述只能生成候选事实、假设、未知或研究问题；只有明确 approver 和批准记录才能形成 approved_fact/approved_requirement；研究 Verdict 只能提出升格请求，不能自行成为业务事实。"
    accepted_or_rejected: accepted
    rejection_reason: null
    score_delta: not_evaluated
    remaining_risk: "事实批准者与需求范围负责人若未在 L2/L3 实例中绑定，机器规则仍无法阻止越权升格。"

  - review_id: INFO-003
    reviewer_role: 信息架构与知识治理专家
    attacked_assumption: "一个通用最小字段样例足以控制所有重要对象类型。"
