schema_version: 1
system_id: ai-project-os
display_name: AI 项目推进操作系统
version: 0.1.0-design
status: design_baseline
primary_language: zh-CN

selected_profile: standard

architecture:
  style: thin_kernel_with_profiles_and_adapters
  kernel_primitives:
    - objective_and_scope
    - controlled_artifacts
    - stable_ids_and_relations
    - state_transitions
    - gates_and_claims
    - runs_and_evidence

authority:
  architecture: docs/architecture/AI_PROJECT_OS_CORE.md
  lifecycle: docs/workflows/PROJECT_LIFECYCLE.md
  architect_workflows: docs/workflows/ARCHITECT_WORKFLOWS.md
  artifact_model: docs/governance/ARTIFACTS_AND_TRACEABILITY.md
  gates_and_scoring: docs/governance/GATES_PROOF_SCORING.md
  research_method: docs/research/RESEARCH_WORKFLOW.md
  research_registry: research/registry.yaml

profiles:
  lite:
    enabled: false
    purpose: low_risk_short_cycle_projects
  standard:
    enabled: true
    purpose: architecture_governed_ai_native_delivery
  multi_agent:
    enabled: false
    activation_requires: research_and_runtime_proof
  production:
    enabled: false
    activation_requires: security_recovery_and_real_runtime_proof

implementation:
  status: not_started
  external_dependencies: []
  dependency_policy: research_then_pilot_then_pin

claim_limits:
  current_maximum: design_baseline
  forbidden:
    - runtime_ready
    - production_ready
    - cross_project_proven
    - requirements_100_percent_complete
