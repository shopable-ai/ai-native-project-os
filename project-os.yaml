# AI Project OS 机器权威配置
#
# 阅读约定：
# - 字段名和枚举编码保留英文，保证程序、Schema 和外部工具稳定解析。
# - 每个非直观字段必须带中文说明，描述性内容直接使用中文。
# - 英文编码不是面向用户的文案；未来命令行和界面默认显示中文。

schema_version: 3                 # 配置结构版本；第 3 版分离框架等级与项目治理配置
system_id: ai-project-os          # 系统稳定标识，不随显示名称变化
display_name: AI 项目推进操作系统   # 中文显示名称
version: 0.1.0-design             # design 系列标识，不表示设计基线已经批准
primary_language: zh-CN           # 人工阅读和输出的默认语言：简体中文

# L1 框架建设范围。四级只表达产品能力边界，不表达项目治理或运行证明。
framework:
  target_edition: standard        # 当前目标是标准框架版本，不表示已经实现
  edition_catalog:
    minimal:
      scope_status: defined       # 最小薄内核范围已定义
    standard:
      scope_status: defined       # 当前目标范围已定义，正在复核
    platform:
      scope_status: bounded       # 只定义边界，本阶段不建设
    enterprise:
      scope_status: bounded       # 最大企业版本，只定义边界，本阶段不建设

# 项目治理能力目录。默认由 L2 系统选择；只有多实例隔离成立时才下沉到可选 L3 实例。
project_governance_catalog:
  selection_scope: l2_system_or_optional_l3_instance
  default_project_fact_scope: l2_system
  optional_instance_scope:
    scope: l3_project_instance
    namespace: projects/{project_id}
    activation_requires: multi_instance_isolation_evidence
  default_base_profile_when_unknown: standard
  base_profiles: [lite, standard]
  overlay_catalog: [multi_agent, production]
  activation_requires: implementation_authorization_and_verdict

# 当前仓库成熟度。选择、实现和验证是不同事实。
maturity:
  design_status: approved
  implementation_status: partial
  verification_status: unverified
  proof_boundary: maturity_fields_do_not_prove_runtime # 成熟度坐标不能替代任何运行 Evidence/Verdict

# 评分与证明观察面。目标设计分不是当前分；每一证明层必须独立形成 Evidence。
score_summary:
  current_overall_score: not_evaluated # 缺完整可重算评分输入，不沿用历史数字
  design_target_score: 95.93            # 仅描述目标方案形态，不表示已经达到
  static_implementation_evidence: present_unscored # 有静态资产/检查，但尚未形成当前总评分
  fixture_proof: fixture_runtime_proven  # 仅匿名 operational-spine fixture 已结构闭合并可重放
  fixture_proof_scope: operational_spine_fixture_only # 不得外推到本地真实、只读真实或生产
  fixture_proof_evidence_ref: reviews/operational-spine-static-and-fixture-evidence.yaml
  requirement_design_static_evidence: present_unscored # 人机需求层只有静态资产和 mutation fixture 证明
  requirement_design_proof_scope: human_requirement_design_static_fixture_only # 不得外推到真实人工或真实 L2
  requirement_design_static_evidence_ref: reviews/human-ai-requirement-design-static-evidence.yaml
  review_policy_certification_static_evidence: present_unscored # 只有 Contract、模板、synthetic fixture 与 C14 静态门禁
  review_policy_certification_proof_scope: static_contract_and_synthetic_fixture_only # 不证明真实模型或真实 L2
  review_policy_certification_static_evidence_ref: reviews/review-policy-certification-static-evidence.yaml
  local_runtime_proof: not_evaluated    # 没有非 fixture 本地真实运行证明
  readonly_real_proof: not_evaluated    # 没有真实目标环境只读预检证明
  production_proof: not_evaluated       # 没有经批准生产 Run/Evidence/Verdict
  hard_gates:
    real_human_usability_test: unmet   # 尚未用真实项目成员验证阅读、审查和批准体验
    real_l2_requirement_migration: unmet # 尚未迁移一个真实 L2 的需求层并由其 Spec 消费
    automatic_impact_simulation: unmet # 当前只有失效语义，没有自动变更影响模拟器
    real_model_multi_run_evaluation: unmet # 尚未执行真实模型的预注册多轮认证评测
    real_l2_policy_consumption: unmet # 尚无真实 L2 使用认证策略推进 Baseline
    cross_project_isolation: unmet      # 跨项目隔离与安全验证尚未成立
    second_heterogeneous_l2: unmet      # 第二个异构 L2 真实验证尚未成立
    independent_adversarial_94_gate: unmet # 当前快照尚未通过独立反方 94 分门禁

# 架构风格和薄内核原语
architecture:
  style: thin_kernel_with_editions_governance_and_adapters  # 薄内核 + 框架等级 + 项目治理 + 外部适配器
  kernel_primitives:
    - objective_and_scope          # 项目目标与范围
    - controlled_artifacts        # 受控产物及权威位置
    - stable_ids_and_relations    # 稳定编号与有类型关系
    - state_transitions           # 状态迁移与重新开启
    - gates_and_claims            # 阶段门禁与完成声明
    - runs_and_evidence           # 运行记录与验证证据

# 同一主题只能有一个可编辑权威定义；摘要必须链接回权威文件。
authority_policy:
  single_editable_truth_per_topic: true
  summaries_must_link_to_authority: true
  raw_sources_may_drive_execution: false  # 原始来源必须先经合法 Decision Gate 升格为受控事实或需求

# 各类问题的唯一权威文件
authority:
  overview: docs/architecture/AI_PROJECT_OS_OVERVIEW.md                  # 人类总览与四条不可折叠主线
  architecture: docs/architecture/AI_PROJECT_OS_CORE.md                 # 核心架构
  framework_editions: docs/architecture/FRAMEWORK_EDITION_MODEL.md       # 四级框架版本范围
  repository_and_layers: docs/architecture/REPOSITORY_AND_LAYER_CONTRACT.md # L1/L2/L3 仓库与兼容契约
  ai_native_execution: docs/architecture/AI_NATIVE_EXECUTION_MODEL.md    # AI 原生执行节点语义
  lifecycle: docs/workflows/PROJECT_LIFECYCLE.md                         # R0、S0—S7 生命周期
  project_delivery_workflow: docs/workflows/PROJECT_DELIVERY_WORKFLOW.md # 从入口到声明的推进控制流
  requirement_design_workflow: docs/workflows/REQUIREMENT_DESIGN_WORKFLOW.md # 人机协作需求设计、决策门与基线冻结
  stage_exit_gates: docs/workflows/STAGE_EXIT_GATES.md                   # 九阶段人类退出门禁视图
  stage_exit_gates_contract: contracts/governance/stage-exit-gates-contract.yaml # 九阶段机器门禁记录契约
  l2_progression: docs/workflows/L2_PROGRESSION.md                       # L2 接入后的端到端推进与重开 SOP
  project_type_and_governance: docs/workflows/PROJECT_TYPE_AND_GOVERNANCE_ROUTING.md # 类型与治理配置路由
  project_governance_policy: policies/project-governance-routing.yaml   # 机器可判定路由条件
  review_policy_activation_policy: policies/review-policy-activation-routing.yaml # 审核策略自动激活、人工确认与阻断路由
  route_decision_contract: contracts/governance/route-decision-contract.yaml        # 路由裁决与逐 overlay 状态契约
  control_set_contract: contracts/governance/control-set-contract.yaml              # 控制集合机器契约
  governance_rule_set_contract: contracts/governance/governance-rule-set-contract.yaml # 受控 Markdown 规则集与条件式批准契约
  ai_review_verdict_contract: contracts/governance/ai-review-verdict-contract.yaml  # 独立 AI 自动审核裁决契约
  rule_gap_case_contract: contracts/governance/rule-gap-case-contract.yaml          # 规则缺口异步治理契约
  overlay_activation_verdict_contract: contracts/governance/overlay-activation-verdict-contract.yaml # 叠加能力激活裁决契约
  authorization_snapshot_contract: contracts/governance/authorization-snapshot-contract.yaml # 授权快照有效性契约
  acceptance_verdict_claim_contract: contracts/governance/acceptance-verdict-claim-contract.yaml # 业务验收裁决与声明契约
  run_evidence_contract: contracts/governance/run-evidence-contract.yaml                # Run 与 Evidence 最小机器结构契约
  review_policy_test_suite_contract: contracts/governance/review-policy-test-suite-contract.yaml # 审核策略预注册测试集契约
  review_policy_certification_contract: contracts/governance/review-policy-certification-contract.yaml # 审核策略认证裁决契约
  chain_package_contract: contracts/artifacts/chain-package-contract.yaml       # 业务链包模板机器契约
  requirement_design_package_contract: contracts/artifacts/requirement-design-package-contract.yaml # 人机需求设计包机器契约
  spec_package_contract: contracts/artifacts/spec-package-contract.yaml         # Spec 五件套模板机器契约
  io_contract: contracts/io/io-contract.yaml                                    # 跨组件 I/O 模板机器契约
  workflow_contract: contracts/execution/workflow-contract.yaml                 # Workflow 模板机器契约
  skill_contract: contracts/execution/skill-contract.yaml                       # Skill 模板机器契约
  project_instance_contract: contracts/governance/project-instance-contract.yaml # 可选 L3 实例模板机器契约
  architect_workflows: docs/workflows/ARCHITECT_WORKFLOWS.md             # 架构师工作流
  artifact_model: docs/governance/ARTIFACTS_AND_TRACEABILITY.md          # 产物与追溯关系
  controlled_object_model: docs/governance/CONTROLLED_OBJECT_MODEL.md    # 受控对象字段、类型与关系
  state_and_invalidation: docs/governance/STATE_TRANSITIONS_AND_INVALIDATION.md # 状态迁移和失效传播
  authorization_and_isolation: docs/governance/AUTHORIZATION_SIDE_EFFECTS_AND_ISOLATION.md # 权限、副作用、隔离
  run_evidence_acceptance: docs/governance/RUN_EVIDENCE_ACCEPTANCE.md    # Run、Evidence、裁决和声明
  review_policy_certification: docs/governance/REVIEW_POLICY_CERTIFICATION.md # 审核策略测试、认证、激活与失效的人类权威
  gates_and_scoring: docs/governance/GATES_PROOF_SCORING.md              # 门禁、证据和评分
  terminology: docs/governance/TERMINOLOGY.md                            # 中文术语和稳定 term-id
  research_method: docs/research/RESEARCH_WORKFLOW.md                     # 研究方法
  research_registry: research/registry.yaml                               # 当前研究任务登记表

# 稳定 term-id 的机器清单必须与 authority.terminology 精确一致；定义仍只在术语权威维护。
terminology_manifest:
  required_term_ids:
    - source
    - business-truth
    - research
    - framework-edition
    - governance-configuration
    - base-governance-profile
    - overlay-capability
    - repository-layer
    - governance-scope
    - lifecycle-stage
    - work-status
    - approval-status
    - approval-route
    - implementation-status
    - proof-level
    - invalidation-status
    - business-chain
    - engineering-chain
    - capability-tree
    - function-tree
    - intent-verification
    - functional-requirement
    - requirement-baseline
    - context-snapshot
    - project-map
    - review-policy-bundle
    - review-policy-certification
    - task-tree
    - behavior-specification
    - behavior-case
    - test-space-modeling
    - workflow
    - skill
    - tool
    - spec
    - run
    - evidence
    - verdict
    - claim

# 审查记录是证据，不承载可编辑规范。
review_evidence:
  p0_design_revision:
    - reviews/p0-design-review-architecture-workflow-adversarial.yaml
    - reviews/p0-design-review-information-security.yaml
    - reviews/p0-design-review-ai-research.yaml
  profile_taxonomy_alignment:
    - reviews/profile-taxonomy-alignment-resolution.yaml
    - reviews/profile-taxonomy-file-audit.yaml
  human_governed_ai_review:
    - reviews/human-governed-ai-review-adversarial.yaml
  review_policy_certification_static:
    - reviews/review-policy-certification-static-evidence.yaml
  historical_invalidated:
    - reviews/phase0-checker-evidence.yaml # 旧检查快照已失效，只保留历史审计
    - reviews/profile-taxonomy-alignment-score.yaml # 旧 84 分封顶记录仅保留历史审计，不再作为 current

scoring_evidence:
  historical_p0_design_revision: reviews/p0-design-revision-score.yaml
  current: reviews/current-score-status.yaml
  human_governed_ai_review: reviews/human-governed-ai-review-score.yaml

# 当前证明快照。它只证明各自声明的 scope，不自动成为当前总评分。
proof_evidence:
  - reviews/operational-spine-static-and-fixture-evidence.yaml
  - reviews/human-ai-requirement-design-static-evidence.yaml
  - reviews/review-policy-certification-static-evidence.yaml

# 第三方依赖策略
dependencies:
  external_dependencies: []       # 尚未锁定任何第三方运行依赖
  dependency_policy: research_then_pilot_then_pin  # 先研究，再试点，最后锁定版本

# 当前完成声明上限
claim_limits:
  current_claims: []               # 当前没有运行或生产完成声明
  ceiling: fixture_runtime_proven  # 只允许描述匿名 operational-spine fixture 的结构与重放证明
  scope: operational_spine_fixture_only
  forbidden:
    - runtime_ready                         # 禁止声明：运行时已就绪
    - production_ready                      # 禁止声明：生产已就绪
    - cross_project_proven                  # 禁止声明：已完成跨项目验证
    - requirements_100_percent_complete     # 禁止声明：代码需求已 100% 完成
    - human_requirement_design_proven_in_real_l2 # 禁止声明：真实 L2 已采用并证明需求设计层
    - automatic_impact_simulation_ready     # 禁止声明：变更影响自动模拟已就绪
    - real_review_policy_runtime_proven     # 禁止声明：真实模型审核策略运行已证明
    - real_l2_policy_consumption_proven     # 禁止声明：真实 L2 已采用认证策略推进
    - general_95_plus                       # 禁止声明：已证明通用 95+
